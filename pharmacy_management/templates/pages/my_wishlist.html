{% extends "templates/pages/base.html" %}

{% block title %}My Wishlist - Pharmacy Management{% endblock %}

{% block content %}
<div class="wishlist-page">
    <div class="container py-4">
        <h2 class="fw-bold mb-4"><i class="bi bi-heart"></i> My Wishlist</h2>
        
        <div id="wishlistContent">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
$(document).ready(function() {
    loadWishlist();
});

function loadWishlist() {
    $.get('/api/method/pharmacy_management.api.wishlist.get_wishlist', function(res) {
        const data = res.message;
        
        if (data.is_empty) {
            $('#wishlistContent').html(`
                <div class="text-center py-5">
                    <i class="bi bi-heart display-1 text-muted"></i>
                    <h4 class="mt-3">Your wishlist is empty</h4>
                    <p class="text-muted">Save your favorite medicines for quick ordering</p>
                    <a href="/shop" class="btn btn-primary btn-lg mt-2">
                        <i class="bi bi-shop"></i> Browse Medicines
                    </a>
                </div>
            `);
            return;
        }
        
        let html = '<div class="row g-3">';
        data.wishlist.forEach(function(med) {
            const discount = med.discount_percent > 0 ? 
                `<span class="discount-badge">${med.discount_percent}% OFF</span>` : '';
            const rx = med.requires_prescription ? 
                `<span class="badge bg-warning text-dark small">Rx</span>` : '';
            
            html += `
                <div class="col-md-3 col-sm-6">
                    <div class="card medicine-card h-100 border-0 shadow-sm">
                        <div class="card-img-wrapper">
                            <a href="/shop/${med.name}">
                                <img src="${med.image || '/assets/pharmacy_management/images/medicine-placeholder.svg'}" 
                                     class="card-img-top" alt="${med.medicine_name}"
                                     onerror="this.src='/assets/pharmacy_management/images/medicine-placeholder.svg'">
                            </a>
                            ${discount}
                            <button class="wishlist-btn active" onclick="removeFromWishlist('${med.name}')">
                                <i class="bi bi-heart-fill text-danger"></i>
                            </button>
                        </div>
                        <div class="card-body">
                            <a href="/shop/${med.name}" class="text-decoration-none">
                                <h6 class="card-title text-dark fw-semibold mb-1">${med.medicine_name}</h6>
                            </a>
                            <p class="text-muted small mb-2">${med.strength || ''} ${med.dosage_form || ''}</p>
                            ${rx}
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <span class="fw-bold text-primary fs-5">₹${med.selling_rate || med.mrp}</span>
                                ${med.mrp > (med.selling_rate || med.mrp) ? 
                                    `<small class="text-decoration-line-through text-muted">₹${med.mrp}</small>` : ''}
                            </div>
                            <button class="btn btn-primary w-100 mt-2" 
                                    onclick="addToCart('${med.name}')"
                                    ${med.in_stock ? '' : 'disabled'}>
                                <i class="bi bi-cart-plus"></i> ${med.in_stock ? 'Add to Cart' : 'Out of Stock'}
                            </button>
                        </div>
                    </div>
                </div>`;
        });
        html += '</div>';
        $('#wishlistContent').html(html);
    });
}

function removeFromWishlist(medicine) {
    frappe.call({
        method: 'pharmacy_management.api.wishlist.remove_from_wishlist',
        args: { medicine: medicine },
        callback: function(r) {
            if (r.message && r.message.success) {
                showToast('Removed from wishlist', 'info');
                loadWishlist();
                updateWishlistBadge();
            } else {
                showToast(r.message?.message || 'Error', 'danger');
            }
        },
        error: function() {
            showToast('Error removing from wishlist', 'danger');
        }
    });
}

function addToCart(medicine) {
    frappe.call({
        method: 'pharmacy_management.api.cart.add_to_cart',
        args: {
            medicine: medicine,
            qty: 1
        },
        callback: function(r) {
            if (r.message && r.message.success) {
                showToast('Added to cart!', 'success');
                updateCartBadge();
            } else {
                showToast(r.message?.message || 'Error', 'danger');
            }
        },
        error: function(r) {
            let errMsg = 'Error adding to cart';
            if (r && r.responseJSON && r.responseJSON._server_messages) {
                try {
                    const msgs = JSON.parse(r.responseJSON._server_messages);
                    errMsg = JSON.parse(msgs[0]).message || errMsg;
                } catch(e) {}
            }
            showToast(errMsg, 'danger');
        }
    });
}
</script>
{% endblock %}
