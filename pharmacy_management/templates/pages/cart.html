{% extends "templates/pages/base.html" %}

{% block title %}Shopping Cart - Pharmacy Management{% endblock %}

{% block content %}
<div class="cart-page">
    <div class="container py-4">
        <h2 class="fw-bold mb-4"><i class="bi bi-cart3"></i> Shopping Cart</h2>
        
        <div id="cartContent">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
$(document).ready(function() {
    loadCart();
});

function loadCart() {
    $.get('/api/method/pharmacy_management.api.cart.get_cart', function(res) {
        const cart = res.message;
        
        if (cart.is_empty) {
            $('#cartContent').html(`
                <div class="text-center py-5">
                    <i class="bi bi-cart-x display-1 text-muted"></i>
                    <h4 class="mt-3">Your cart is empty</h4>
                    <p class="text-muted">Browse our medicines and add items to your cart</p>
                    <a href="/shop" class="btn btn-primary btn-lg mt-2">
                        <i class="bi bi-shop"></i> Start Shopping
                    </a>
                </div>
            `);
            return;
        }

        let html = `
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            ${cart.requires_prescription ? `
                            <div class="alert alert-warning d-flex align-items-center">
                                <i class="bi bi-prescription2 fs-4 me-2"></i>
                                <div>Some medicines require a valid prescription. 
                                <a href="/prescriptions" class="alert-link">Upload now</a></div>
                            </div>` : ''}
                            
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0">${cart.item_count} Item(s)</h5>
                                <button class="btn btn-outline-danger btn-sm" onclick="clearCart()">
                                    <i class="bi bi-trash"></i> Clear Cart
                                </button>
                            </div>
                            <hr>`;

        cart.items.forEach(function(item) {
            const rxBadge = item.requires_prescription ? 
                '<span class="badge bg-warning text-dark ms-1">Rx</span>' : '';
            html += `
                <div class="cart-item d-flex align-items-center py-3 border-bottom" data-medicine="${item.medicine}">
                    <div class="flex-shrink-0">
                        <img src="${item.image || '/assets/pharmacy_management/images/medicine-placeholder.svg'}" 
                             style="width: 70px; height: 70px; object-fit: contain;" alt="${item.medicine_name}">
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="mb-1">${item.medicine_name} ${rxBadge}</h6>
                        <small class="text-muted">${item.strength || ''} ${item.dosage_form || ''}</small>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <div class="d-flex align-items-center">
                                <button class="btn btn-outline-secondary btn-sm" onclick="updateCart('${item.medicine}', ${item.qty - 1})">-</button>
                                <span class="mx-3 fw-semibold">${item.qty}</span>
                                <button class="btn btn-outline-secondary btn-sm" onclick="updateCart('${item.medicine}', ${item.qty + 1})">+</button>
                            </div>
                            <div class="text-end">
                                <div class="fw-bold text-primary">₹${item.amount.toFixed(2)}</div>
                                ${item.mrp > item.rate ? `<small class="text-decoration-line-through text-muted">₹${(item.mrp * item.qty).toFixed(2)}</small>` : ''}
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-link text-danger ms-2" onclick="removeItem('${item.medicine}')">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>`;
        });

        html += `
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm sticky-cart">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-3">Order Summary</h5>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Subtotal</span>
                                <span class="fw-semibold">₹${cart.subtotal.toFixed(2)}</span>
                            </div>
                            ${cart.total_saving > 0 ? `
                            <div class="d-flex justify-content-between mb-2 text-success">
                                <span>You Save</span>
                                <span class="fw-semibold">-₹${cart.total_saving.toFixed(2)}</span>
                            </div>` : ''}
                            ${cart.coupon_discount > 0 ? `
                            <div class="d-flex justify-content-between mb-2 text-success">
                                <span>Coupon Discount</span>
                                <span class="fw-semibold">-₹${cart.coupon_discount.toFixed(2)}</span>
                            </div>` : ''}
                            <div class="d-flex justify-content-between mb-2">
                                <span>Shipping</span>
                                <span class="fw-semibold">${cart.shipping === 0 ? '<span class="text-success">FREE</span>' : '₹' + cart.shipping.toFixed(2)}</span>
                            </div>
                            ${cart.shipping > 0 ? `<small class="text-muted d-block mb-2">Add ₹${(cart.free_shipping_threshold - cart.subtotal).toFixed(2)} more for free shipping</small>` : ''}
                            <hr>
                            <div class="d-flex justify-content-between mb-3">
                                <span class="fw-bold fs-5">Total</span>
                                <span class="fw-bold fs-5 text-primary">₹${cart.grand_total.toFixed(2)}</span>
                            </div>
                            
                            <!-- Coupon -->
                            <div class="coupon-section mb-3">
                                <div class="input-group">
                                    <input type="text" id="couponInput" class="form-control" placeholder="Coupon code" 
                                           value="${cart.coupon_code || ''}">
                                    <button class="btn btn-outline-primary" onclick="applyCoupon()">
                                        ${cart.coupon_code ? 'Change' : 'Apply'}
                                    </button>
                                </div>
                                ${cart.coupon_code ? `<small class="text-success"><i class="bi bi-check-circle"></i> Coupon applied</small>` : ''}
                            </div>

                            <button class="btn btn-primary btn-lg w-100" onclick="proceedToCheckout()">
                                <i class="bi bi-lock-fill"></i> Proceed to Checkout
                            </button>
                            <a href="/shop" class="btn btn-link w-100 mt-2 text-decoration-none">
                                <i class="bi bi-arrow-left"></i> Continue Shopping
                            </a>
                        </div>
                    </div>
                </div>
            </div>`;

        $('#cartContent').html(html);
    }).fail(function() {
        $('#cartContent').html(`
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
                <h4 class="mt-3">Could not load cart</h4>
                <p class="text-muted">Please try again</p>
            </div>
        `);
    });
}

function updateCart(medicine, qty) {
    if (qty <= 0) {
        removeItem(medicine);
        return;
    }
    $.post('/api/method/pharmacy_management.api.cart.update_cart', {
        medicine: medicine,
        qty: qty
    }, function(res) {
        if (res.message.success) {
            loadCart();
            updateCartBadge();
        }
    });
}

function removeItem(medicine) {
    $.post('/api/method/pharmacy_management.api.cart.remove_cart_item', {
        medicine: medicine
    }, function(res) {
        if (res.message.success) {
            loadCart();
            updateCartBadge();
        }
    });
}

function clearCart() {
    if (confirm('Clear your entire cart?')) {
        $.post('/api/method/pharmacy_management.api.cart.clear_cart', function(res) {
            if (res.message.success) {
                loadCart();
                updateCartBadge();
            }
        });
    }
}

function applyCoupon() {
    const code = $('#couponInput').val().trim();
    if (!code) return;
    
    $.post('/api/method/pharmacy_management.api.cart.apply_coupon', {
        coupon_code: code
    }, function(res) {
        if (res.message.success) {
            showToast(res.message.message, 'success');
            loadCart();
        } else {
            showToast(res.message.message, 'warning');
        }
    }).fail(function(xhr) {
        showToast(xhr.responseJSON?.message || 'Invalid coupon', 'warning');
    });
}

function proceedToCheckout() {
    window.location.href = '/checkout';
}

function showToast(message, type) {
    const toast = $(`
        <div class="toast align-items-center text-bg-${type} border-0 position-fixed bottom-0 end-0 m-3" role="alert">
            <div class="d-flex">
                <div class="toast-body">${message}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    `);
    $('body').append(toast);
    toast.toast({delay: 3000}).toast('show');
    setTimeout(() => toast.remove(), 3500);
}

function updateCartBadge() {
    $.get('/api/method/pharmacy_management.api.cart.get_cart_count', function(res) {
        $('.cart-badge').text(res.message.count).toggleClass('d-none', res.message.count === 0);
    });
}
</script>
{% endblock %}
