{% extends "templates/pages/base.html" %}

{% block title %}Payment - Pharmacy Management{% endblock %}

{% block content %}
<div class="payment-page">
    <div class="container py-4">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/cart" class="text-decoration-none"><i class="bi bi-cart3"></i> Cart</a></li>
                <li class="breadcrumb-item"><a href="/checkout" class="text-decoration-none">Checkout</a></li>
                <li class="breadcrumb-item active" aria-current="page">Payment</li>
                <li class="breadcrumb-item text-muted">Confirmation</li>
            </ol>
        </nav>

        <div id="paymentContent">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 text-muted">Loading payment details...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
var paymentData = null;

$(document).ready(function() {
    try {
        paymentData = {{ payment_data|safe }};
    } catch(e) {
        paymentData = { error: 'Failed to parse payment data' };
    }
    renderPaymentPage();
});

function renderPaymentPage() {
    if (!paymentData || paymentData.error) {
        $('#paymentContent').html(`
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle display-3 text-warning"></i>
                <h4 class="mt-3">Payment Error</h4>
                <p class="text-muted">${escapeHtml(paymentData ? paymentData.error : 'Invalid payment data')}</p>
                <a href="/checkout" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Back to Checkout</a>
            </div>
        `);
        return;
    }

    var method = paymentData.method;
    if (method === 'UPI') {
        renderUpiPayment();
    } else if (method === 'CARD') {
        renderCardPayment();
    } else {
        $('#paymentContent').html(`
            <div class="text-center py-5">
                <i class="bi bi-question-circle display-3 text-muted"></i>
                <h4 class="mt-3">Unknown Payment Method</h4>
                <p class="text-muted">Please go back and select a valid payment method.</p>
                <a href="/checkout" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Back to Checkout</a>
            </div>
        `);
    }
}

// ====================================================================
// UPI PAYMENT
// ====================================================================
function renderUpiPayment() {
    var upiId = paymentData.upi_id;
    var upiHolder = paymentData.upi_holder_name;
    var amount = parseFloat(paymentData.grand_total || 0);
    var orderId = paymentData.order_id;

    // Build UPI deep link for QR code
    var upiLink = 'upi://pay?' +
        'pa=' + encodeURIComponent(upiId || 'example@upi') +
        '&pn=' + encodeURIComponent(upiHolder || 'Pharmacy') +
        '&am=' + encodeURIComponent(amount) +
        '&cu=INR' +
        '&tr=' + encodeURIComponent(orderId);

    var qrUrl = 'https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=' + encodeURIComponent(upiLink);

    var html = `
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 text-center">
                        <h3 class="fw-bold mb-1">Pay via UPI</h3>
                        <p class="text-muted mb-4">Scan the QR code with any UPI app to pay</p>

                        <!-- UPi QR Code -->
                        <div class="d-flex justify-content-center mb-4">
                            <div class="p-3 bg-white rounded-3 border" style="box-shadow: 0 4px 16px rgba(0,0,0,0.08);">
                                ${upiId ? `
                                <img src="${qrUrl}" alt="UPI QR Code" style="width: 220px; height: 220px;"
                                     class="img-fluid" loading="lazy"
                                     onerror="this.outerHTML='<div class=\\'alert alert-warning\\'><i class=\\'bi bi-exclamation-triangle\\'></i> QR code could not be generated. Use the UPI ID below.</div>'">
                                ` : `
                                <div class="alert alert-warning mb-0" style="width: 220px;">
                                    <i class="bi bi-exclamation-triangle"></i>
                                    <p class="mb-0 mt-2">UPI not configured. Contact pharmacy.</p>
                                </div>
                                `}
                            </div>
                        </div>

                        <!-- Payment Details -->
                        <div class="bg-light rounded-3 p-3 mb-3 text-start">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">Order ID:</span>
                                <span class="fw-semibold">${orderId}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">Amount to Pay:</span>
                                <span class="fw-bold fs-4 text-success">₹${amount.toFixed(2)}</span>
                            </div>
                            <hr class="my-2">
                            <p class="mb-1 small text-muted"><i class="bi bi-info-circle"></i> Pay to UPI ID:</p>
                            <p class="mb-0 fs-5 fw-bold text-primary font-monospace">${escapeHtml(upiId || 'Not configured')}</p>
                            ${upiHolder ? `<p class="mb-0 text-muted small">Account: ${escapeHtml(upiHolder)}</p>` : ''}
                        </div>

                        <!-- Items Summary -->
                        <details class="mb-3 text-start">
                            <summary class="small text-muted cursor-pointer">View order items</summary>
                            <div class="mt-2">
                                ${(paymentData.items || []).map(function(item) {
                                    return `<div class="d-flex justify-content-between small py-1 border-bottom">
                                        <span>${escapeHtml(item.item_name)} x${item.qty}</span>
                                        <span>₹${parseFloat(item.amount).toFixed(2)}</span>
                                    </div>`;
                                }).join('')}
                            </div>
                        </details>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-2">
                            ${upiId ? `
                            <button class="btn btn-success btn-lg" onclick="confirmUpiPayment('${orderId}')" id="confirmUpiBtn">
                                <i class="bi bi-check-circle"></i> I've Paid — Confirm Order
                            </button>
                            <button class="btn btn-outline-primary" onclick="window.open('${qrUrl}', '_blank')">
                                <i class="bi bi-qr-code"></i> Open QR Code Full Size
                            </button>
                            ` : `
                            <p class="text-warning"><i class="bi bi-exclamation-triangle"></i> UPI payment not configured. Please contact the pharmacy.</p>
                            <a href="/my-orders" class="btn btn-primary btn-lg">
                                <i class="bi bi-box"></i> View My Orders
                            </a>
                            `}
                            <div id="upiConfirmMsg" class="d-none text-center mt-2">
                                <div class="spinner-border spinner-border-sm text-success"></div>
                                <small class="text-muted ms-1">Confirming payment...</small>
                            </div>
                            <a href="/my-orders" class="btn btn-outline-secondary">
                                <i class="bi bi-box"></i> Pay Later — View Orders
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;

    $('#paymentContent').html(html);
}

function confirmUpiPayment(orderId) {
    var btn = $('#confirmUpiBtn');
    btn.prop('disabled', true);
    $('#upiConfirmMsg').removeClass('d-none');

    frappe.call({
        method: 'pharmacy_management.api.cart.confirm_upi_payment',
        args: { order_id: orderId },
        callback: function(res) {
            var data = res.message;
            if (data && data.success) {
                showToast('Payment confirmed! Order is now active.', 'success');
                setTimeout(function() {
                    window.location.href = '/order-confirmation?order_id=' + encodeURIComponent(orderId);
                }, 1000);
            } else {
                btn.prop('disabled', false);
                $('#upiConfirmMsg').addClass('d-none');
                showToast(data && data.message ? data.message : 'Failed to confirm payment', 'danger');
            }
        },
        error: function() {
            btn.prop('disabled', false);
            $('#upiConfirmMsg').addClass('d-none');
            showToast('Failed to confirm payment. Please try again.', 'danger');
        }
    });
}

// ====================================================================
// CARD / UPI / NET BANKING PAYMENT (via Razorpay)
// ====================================================================
function renderCardPayment() {
    var amount = parseFloat(paymentData.grand_total || 0);
    var orderId = paymentData.order_id;

    var html = `
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="fw-bold mb-1">Pay Online</h3>
                        <p class="text-muted mb-4">Complete your payment securely via Razorpay</p>

                        <!-- Order Summary -->
                        <div class="bg-light rounded-3 p-3 mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted">Order:</span>
                                <span class="fw-semibold">${orderId}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted">Amount:</span>
                                <span class="fw-bold fs-4 text-primary">₹${amount.toFixed(2)}</span>
                            </div>
                        </div>

                        <!-- Payment Methods Display -->
                        <div class="text-center mb-4">
                            <div class="d-flex justify-content-center gap-3 mb-3">
                                <span class="badge bg-light text-dark p-2 border"><i class="bi bi-credit-card"></i> Cards</span>
                                <span class="badge bg-light text-dark p-2 border"><i class="bi bi-phone"></i> UPI</span>
                                <span class="badge bg-light text-dark p-2 border"><i class="bi bi-building"></i> Net Banking</span>
                                <span class="badge bg-light text-dark p-2 border"><i class="bi bi-wallet2"></i> Wallet</span>
                            </div>
                            <p class="small text-muted">Secure payment powered by Razorpay</p>
                            <div class="mb-3">
                                <i class="bi bi-lock-fill text-success"></i>
                                <span class="text-success small fw-semibold">256-bit SSL Encrypted</span>
                            </div>
                        </div>

                        <!-- Pay Button -->
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary btn-lg" onclick="payWithRazorpay('${orderId}')" id="payNowBtn">
                                <i class="bi bi-credit-card"></i> Pay ₹${amount.toFixed(2)}
                            </button>
                            <div id="paymentProcessingMsg" class="d-none text-center mt-2">
                                <div class="spinner-border spinner-border-sm text-primary"></div>
                                <small class="text-muted ms-1">Opening secure payment window...</small>
                            </div>
                            <div id="razorpayResult" class="d-none text-center mt-2"></div>
                            <a href="/my-orders" class="btn btn-outline-secondary">
                                <i class="bi bi-box"></i> Pay Later — View Orders
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Security Badges -->
                <div class="d-flex justify-content-center gap-4 mt-4">
                    <div class="text-center">
                        <i class="bi bi-shield-check text-success fs-3"></i>
                        <small class="d-block text-muted">Secure Payment</small>
                    </div>
                    <div class="text-center">
                        <i class="bi bi-arrow-return-left text-primary fs-3"></i>
                        <small class="d-block text-muted">Easy Returns</small>
                    </div>
                    <div class="text-center">
                        <i class="bi bi-headset text-warning fs-3"></i>
                        <small class="d-block text-muted">24/7 Support</small>
                    </div>
                </div>
            </div>
        </div>
    `;

    $('#paymentContent').html(html);
}

function payWithRazorpay(orderId) {
    var btn = $('#payNowBtn');
    btn.prop('disabled', true);
    $('#paymentProcessingMsg').removeClass('d-none');

    // Initiate Razorpay payment
    $.get('/api/method/pharmacy_management.api.cart.razorpay_pay', { order_id: orderId }, function(res) {
        var data = res.message;
        if (!data || !data.success) {
            btn.prop('disabled', false);
            $('#paymentProcessingMsg').addClass('d-none');
            showToast(data && data.message ? data.message : 'Failed to initiate payment', 'danger');
            return;
        }

        // Test mode - no Razorpay keys configured
        if (data.test_mode) {
            frappe.call({
                method: 'pharmacy_management.api.cart.razorpay_verify',
                args: {
                    order_id: orderId,
                    razorpay_payment_id: 'test_payment',
                    razorpay_order_id: 'test_order',
                    razorpay_signature: 'test_signature'
                },
                callback: function(verifyRes) {
                    var vdata = verifyRes.message;
                    if (vdata && vdata.success) {
                        showToast('Payment successful! Order confirmed.', 'success');
                        setTimeout(function() {
                            window.location.href = '/order-confirmation?order_id=' + encodeURIComponent(orderId);
                        }, 1000);
                    } else {
                        btn.prop('disabled', false);
                        $('#paymentProcessingMsg').addClass('d-none');
                        showToast(vdata && vdata.message ? vdata.message : 'Payment verification failed', 'danger');
                    }
                },
                error: function() {
                    btn.prop('disabled', false);
                    $('#paymentProcessingMsg').addClass('d-none');
                    showToast('Payment verification failed. Please contact support.', 'danger');
                }
            });
            return;
        }

        // Real Razorpay checkout
        var options = {
            key: data.key_id,
            amount: data.amount,
            currency: data.currency || 'INR',
            name: 'Pharmacy Management',
            description: 'Order ' + orderId,
            order_id: data.razorpay_order_id,
            prefill: data.prefill || {},
            theme: data.theme || { color: '#2563eb' },
            handler: function(response) {
                frappe.call({
                    method: 'pharmacy_management.api.cart.razorpay_verify',
                    args: {
                        order_id: orderId,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_signature: response.razorpay_signature
                    },
                    callback: function(verifyRes) {
                        var vdata = verifyRes.message;
                        if (vdata && vdata.success) {
                            showToast('Payment successful! Order confirmed.', 'success');
                            setTimeout(function() {
                                window.location.href = '/order-confirmation?order_id=' + encodeURIComponent(orderId);
                            }, 1000);
                        } else {
                            btn.prop('disabled', false);
                            $('#razorpayResult').removeClass('d-none').html('<span class="text-danger">' + (vdata && vdata.message ? vdata.message : 'Payment verification failed') + '</span>');
                            showToast(vdata && vdata.message ? vdata.message : 'Payment verification failed', 'danger');
                        }
                    },
                    error: function() {
                        btn.prop('disabled', false);
                        $('#razorpayResult').removeClass('d-none').html('<span class="text-danger">Payment verification failed. Please contact support.</span>');
                        showToast('Payment verification failed. Please contact support.', 'danger');
                    }
                });
            },
            modal: {
                ondismiss: function() {
                    btn.prop('disabled', false);
                    $('#paymentProcessingMsg').addClass('d-none');
                    showToast('Payment cancelled. You can pay later from your orders page.', 'info');
                }
            }
        };
        var rzp = new Razorpay(options);
        rzp.open();
        $('#paymentProcessingMsg').addClass('d-none');
    }).fail(function(xhr) {
        btn.prop('disabled', false);
        $('#paymentProcessingMsg').addClass('d-none');
        var msg = 'Failed to initiate payment';
        try { msg = xhr.responseJSON && xhr.responseJSON.message ? xhr.responseJSON.message : msg; } catch(e) {}
        showToast(msg, 'danger');
    });
}

function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
}

function showToast(message, type) {
    var iconMap = { success: 'bi-check-circle-fill', danger: 'bi-exclamation-circle-fill', warning: 'bi-exclamation-triangle-fill', info: 'bi-info-circle-fill' };
    var toast = $(`
        <div class="toast align-items-center text-bg-${type} border-0 position-fixed bottom-0 end-0 m-3" role="alert">
            <div class="d-flex">
                <div class="toast-body"><i class="bi ${iconMap[type] || 'bi-info-circle-fill'} me-2"></i>${message}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    `);
    $('body').append(toast);
    if (typeof bootstrap !== 'undefined' && bootstrap.Toast) {
        new bootstrap.Toast(toast[0], { delay: 3000 }).show();
    } else {
        toast.fadeIn(300).delay(3000).fadeOut(300, function() { $(this).remove(); });
    }
    setTimeout(function() { toast.remove(); }, 3500);
}
</script>
{% endblock %}
