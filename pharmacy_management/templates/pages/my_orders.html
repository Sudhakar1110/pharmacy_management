{% extends "templates/pages/base.html" %}

{% block title %}My Orders - Pharmacy Management{% endblock %}

{% block content %}
<div class="orders-page">
    <div class="container py-4">
        <h2 class="fw-bold mb-4"><i class="bi bi-box"></i> My Orders</h2>
        
        <div id="ordersContent">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
$(document).ready(function() {
    loadOrders();
});

function loadOrders(page = 1) {
    $.get('/api/method/pharmacy_management.api.customer.get_customer_orders', {
        page: page,
        limit: 10
    }, function(res) {
        const data = res.message;
        
        if (data.orders.length === 0) {
            $('#ordersContent').html(`
                <div class="text-center py-5">
                    <i class="bi bi-box-seam display-1 text-muted"></i>
                    <h4 class="mt-3">No orders yet</h4>
                    <p class="text-muted">Start shopping to see your orders here</p>
                    <a href="/shop" class="btn btn-primary btn-lg mt-2">
                        <i class="bi bi-shop"></i> Start Shopping
                    </a>
                </div>
            `);
            return;
        }
        
        let html = '<div class="row g-3">';
        data.orders.forEach(function(order) {
            const statusBadge = {
                'To Bill': 'warning',
                'To Deliver': 'info',
                'To Deliver and Bill': 'warning',
                'Completed': 'success',
                'Cancelled': 'danger',
            }[order.status] || 'secondary';
            
            const itemList = order.items ? order.items.slice(0, 3).map(i => 
                `<small class="d-block">${i.item_name} × ${i.qty}</small>`
            ).join('') : '';
            
            html += `
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="fw-bold mb-1">Order #${order.name}</h6>
                                    <small class="text-muted">${order.transaction_date}</small>
                                </div>
                                <span class="badge bg-${statusBadge}">${order.status}</span>
                            </div>
                            ${itemList ? `<div class="mt-2">${itemList}</div>` : ''}
                            ${order.items && order.items.length > 3 ? `<small class="text-muted">+${order.items.length - 3} more items</small>` : ''}
                            <hr>
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="fw-bold fs-5 text-primary">₹${order.grand_total.toFixed(2)}</span>
                                    <span class="text-muted ms-2">| ${order.total_qty || 0} items</span>
                                </div>
                                <a href="/track-order/${order.name}" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-truck"></i> Track Order
                                </a>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
        html += '</div>';
        
        // Pagination
        if (data.pages > 1) {
            html += '<nav class="mt-4"><ul class="pagination justify-content-center">';
            for (let i = 1; i <= data.pages; i++) {
                html += `<li class="page-item ${i === data.page ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadOrders(${i})">${i}</a>
                </li>`;
            }
            html += '</ul></nav>';
        }
        
        $('#ordersContent').html(html);
    }).fail(function() {
        $('#ordersContent').html(`
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
                <h4 class="mt-3">Could not load orders</h4>
                <p class="text-muted">Please <a href="/login">login</a> to view your orders</p>
            </div>
        `);
    });
}
</script>
{% endblock %}
